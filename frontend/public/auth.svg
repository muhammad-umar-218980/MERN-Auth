<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="outerGlow" x="-30%" y="-20%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#38bdf8" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shieldShadow" x="-25%" y="-15%" width="155%" height="155%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.5"/>
    </filter>

    <filter id="checkGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="shieldBase" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b35"/>
    </linearGradient>

    <linearGradient id="shieldFace" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#3b9ee8"/>
      <stop offset="50%" stop-color="#1d6bc4"/>
      <stop offset="100%" stop-color="#0d4a99"/>
    </linearGradient>

    <radialGradient id="shimmer" cx="35%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="rimLight" x1="100%" y1="30%" x2="70%" y2="80%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="bottomGlow" cx="50%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient outer halo -->
  <ellipse cx="102" cy="110" rx="72" ry="72" fill="#2563eb" opacity="0.08"/>

  <!-- Base shield — wider sides (28 / 172 instead of 37 / 163) -->
  <path d="M100 10 L172 35 L172 108 Q172 161 100 190 Q28 161 28 108 L28 35 Z"
        fill="url(#shieldBase)"
        filter="url(#shieldShadow)"/>

  <path d="M100 10 L172 35 L172 108 Q172 161 100 190 Q28 161 28 108 L28 35 Z"
        fill="none"
        stroke="#4a90d9"
        stroke-width="1"
        stroke-opacity="0.4"/>

  <!-- Inner face — wider (40 / 160 instead of 49 / 151) -->
  <path d="M100 24 L160 45 L160 105 Q160 151 100 175 Q40 151 40 105 L40 45 Z"
        fill="url(#shieldFace)"/>

  <path d="M100 24 L160 45 L160 105 Q160 151 100 175 Q40 151 40 105 L40 45 Z"
        fill="url(#bottomGlow)"/>

  <path d="M100 24 L160 45 L160 105 Q160 151 100 175 Q40 151 40 105 L40 45 Z"
        fill="url(#shimmer)"/>

  <path d="M100 24 L160 45 L160 105 Q160 151 100 175 Q40 151 40 105 L40 45 Z"
        fill="url(#rimLight)"/>

  <path d="M100 24 L160 45 L160 105 Q160 151 100 175 Q40 151 40 105 L40 45 Z"
        fill="none"
        stroke="white"
        stroke-width="0.8"
        stroke-opacity="0.12"/>

  <!-- Checkmark with glow -->
  <path d="M73 101 L89 119 L127 79"
        stroke="white"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#checkGlow)"
        opacity="0.95"/>

  <path d="M73 101 L89 119 L127 79"
        stroke="white"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>